<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exito Azul - Registro</title>
    <style>
      :root {
        color: #111111;
        background: #f6f9ff;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      .banner {
        position: fixed;
        top: 0;
        left: 0;
        width: 10%;
        min-height: 100vh;
        border-right: 1px solid #d6e4ff;
        background: #fff;
        padding: 0.8rem 0.4rem;
      }

      .banner-actions {
        display: grid;
        gap: 0.5rem;
      }

      .banner-actions button {
        border: 1px solid #d6e4ff;
        border-radius: 9px;
        padding: 0.45rem;
        background: #fff;
        color: #303743;
        font-weight: 700;
      }

      .shell {
        margin-left: 10%;
        width: 90%;
        padding: 1rem;
        display: grid;
        gap: 1rem;
      }

      .hero,
      .panel,
      .footer {
        border: 1px solid #d6e4ff;
        border-radius: 14px;
        background: #fff;
      }

      .hero {
        padding: 1rem;
      }

      .eyebrow {
        margin: 0;
        color: #08439b;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hero h1 {
        margin: 0.45rem 0 0;
        color: #0b5ed7;
      }

      .hero p {
        margin: 0.45rem 0 0;
        color: #303743;
      }

      .panel {
        padding: 1rem;
      }

      form {
        display: grid;
        gap: 0.8rem;
        max-width: 460px;
      }

      label {
        display: grid;
        gap: 0.3rem;
        font-weight: 700;
      }

      input {
        border: 1px solid #d6e4ff;
        border-radius: 10px;
        padding: 0.6rem 0.7rem;
        font: inherit;
      }

      button[type='submit'] {
        border: 1px solid #0b5ed7;
        background: #0b5ed7;
        color: #fff;
        border-radius: 10px;
        padding: 0.6rem 0.8rem;
        font-weight: 700;
        cursor: pointer;
      }

      .note {
        color: #303743;
      }

      .footer {
        padding: 0.8rem 1rem;
        display: flex;
        justify-content: space-between;
        gap: 0.6rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .footer a {
        color: #08439b;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <aside class="banner">
      <div class="banner-actions">
        <button type="button">Configuracion</button>
        <button type="button">Cerrar sesion</button>
        <button type="button">Usuario</button>
      </div>
    </aside>

    <div class="shell">
      <header class="hero">
        <p class="eyebrow">Exito Azul</p>
        <h1>Galeria privada con links temporales y sin descarga</h1>
        <p>Envio directo si hay compatibilidad. Si no, fallback automatico a link temporal.</p>
      </header>

      <main class="panel">
        <h2>Registro de usuario</h2>
        <p class="note">Este HTML es una base visual para el flujo de registro.</p>

        <form>
          <label>
            Nombre completo
            <input type="text" placeholder="Ejemplo: Ana Perez" />
          </label>

          <label>
            Email
            <input type="email" placeholder="ana@correo.com" />
          </label>

          <label>
            Clave
            <input type="password" placeholder="Minimo 6 caracteres" />
          </label>

          <button type="submit">Registrar usuario</button>
        </form>
      </main>

      <footer class="footer">
        <span>Exito Azul 2026</span>
        <a href="/privacy#privacy-policy">Politica de privacidad</a>
      </footer>
    </div>
  </body>
</html>
