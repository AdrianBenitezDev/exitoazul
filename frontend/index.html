<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Exito Azul: galeria privada para guardar y compartir imagenes con links temporales."
    />
    <title>Exito Azul</title>
    <style>
      :root {
        color: #111111;
        background: #f6f9ff;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      .boot-banner {
        position: fixed;
        top: 0;
        left: 0;
        width: 10%;
        min-height: 100vh;
        border-right: 1px solid #d6e4ff;
        background: #ffffff;
        padding: 0.8rem 0.4rem;
      }

      .boot-banner-actions {
        display: grid;
        gap: 0.5rem;
      }

      .boot-banner-actions button {
        border: 1px solid #d6e4ff;
        background: #fff;
        border-radius: 9px;
        padding: 0.45rem;
        color: #303743;
        font-weight: 700;
      }

      .boot-shell {
        margin-left: 10%;
        width: 90%;
        padding: 1rem;
        display: grid;
        gap: 1rem;
      }

      .boot-hero,
      .boot-footer,
      .boot-main {
        border: 1px solid #d6e4ff;
        border-radius: 14px;
        background: #ffffff;
      }

      .boot-hero {
        padding: 1rem;
      }

      .boot-eyebrow {
        margin: 0;
        color: #08439b;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .boot-title {
        margin: 0.45rem 0 0;
        color: #0b5ed7;
        font-size: 1.25rem;
      }

      .boot-subtitle {
        margin: 0.5rem 0 0;
        color: #303743;
      }

      .boot-main {
        min-height: 52vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 1.4rem;
      }

      .boot-main p {
        margin: 0.4rem 0 0;
      }

      .boot-footer {
        display: flex;
        justify-content: space-between;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
        padding: 0.8rem 1rem;
      }

      .boot-footer a {
        color: #08439b;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <aside class="boot-banner">
        <div class="boot-banner-actions">
          <button type="button">Configuracion</button>
          <button type="button">Cerrar sesion</button>
          <button type="button">Usuario</button>
        </div>
      </aside>

      <div class="boot-shell">
        <header class="boot-hero">
          <p class="boot-eyebrow">Exito Azul</p>
          <h1 class="boot-title">Galeria privada con links temporales y sin descarga</h1>
          <p class="boot-subtitle">
            Envio directo si hay compatibilidad. Si no, fallback automatico a link temporal.
          </p>
        </header>

        <main class="boot-main">
          <div>
            <h2>Inicializando aplicacion...</h2>
            <p>Si este mensaje persiste, ejecuta la app con npm run dev.</p>
            <noscript>Activa JavaScript para cargar la experiencia completa.</noscript>
          </div>
        </main>

        <footer class="boot-footer">
          <span>Exito Azul 2026</span>
          <a href="/privacy#privacy-policy">Politica de privacidad</a>
        </footer>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
